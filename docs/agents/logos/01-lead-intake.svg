<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Agent Prospection — Indigo, loupe avec radar -->
  <rect width="512" height="512" rx="96" fill="#6366F1"/>
  <!-- Radar dots -->
  <circle cx="140" cy="140" r="8" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="380" cy="140" r="8" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="140" cy="380" r="8" fill="#FFFFFF" opacity="0.35"/>
  <!-- Magnifying glass body -->
  <circle cx="220" cy="220" r="92" fill="none" stroke="#FFFFFF" stroke-width="28"/>
  <!-- Crosshair -->
  <line x1="220" y1="160" x2="220" y2="280" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <line x1="160" y1="220" x2="280" y2="220" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="290" y1="290" x2="400" y2="400" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
</svg>
