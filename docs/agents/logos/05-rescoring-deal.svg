<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Agent Re-scoring Deal — Orange, cible avec flèche dans le mille -->
  <rect width="512" height="512" rx="96" fill="#F97316"/>
  <!-- Cible : 4 anneaux concentriques -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FFFFFF" stroke-width="14" opacity="0.95"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#FFFFFF" stroke-width="14" opacity="0.95"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#FFFFFF" stroke-width="14" opacity="0.95"/>
  <circle cx="256" cy="256" r="30" fill="#FFFFFF"/>
  <!-- Flèche qui rentre dans le mille -->
  <g transform="translate(256 256) rotate(-30)">
    <!-- Hampe -->
    <line x1="0" y1="0" x2="160" y2="0" stroke="#0B1220" stroke-width="14" stroke-linecap="round"/>
    <!-- Plumes (empennage) -->
    <path d="M 130 -16 L 160 0 L 130 16 L 138 0 Z" fill="#0B1220"/>
    <!-- Pointe (à l'origine = centre cible) -->
    <path d="M 0 0 L -22 -10 L -22 10 Z" fill="#0B1220"/>
  </g>
</svg>
