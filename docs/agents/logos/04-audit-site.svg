<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Agent Audit Site — Vert, globe avec bouclier check -->
  <rect width="512" height="512" rx="96" fill="#22C55E"/>
  <!-- Globe -->
  <circle cx="220" cy="240" r="120" fill="none" stroke="#FFFFFF" stroke-width="20"/>
  <!-- Méridien horizontal -->
  <ellipse cx="220" cy="240" rx="120" ry="48" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Méridien vertical -->
  <ellipse cx="220" cy="240" rx="48" ry="120" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Méridien central -->
  <line x1="100" y1="240" x2="340" y2="240" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Bouclier check en haut à droite -->
  <g transform="translate(360 130)">
    <path d="M 0 -50
             L 50 -28
             L 50 28
             Q 50 60 0 88
             Q -50 60 -50 28
             L -50 -28 Z"
          fill="#FFFFFF"/>
    <!-- Coche -->
    <path d="M -22 8 L -4 26 L 26 -10"
          fill="none" stroke="#22C55E" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
